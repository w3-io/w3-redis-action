name: "W3 Redis Action"
description: "Redis key-value store, caching, counters, lists, and TTL for W3 workflows"
author: "w3-io"

inputs:
  command:
    description: "Operation: get, set, del, incr, decr, expire, ttl, exists, keys, lpush, rpush, lpop, rpop, lrange, llen, hget, hset, hdel, hgetall, sadd, smembers, sismember, srem"
    required: true
  url:
    description: "Redis connection URL (redis://user:pass@host:port)"
    required: true
  key:
    description: "Redis key"
    required: false
    default: ""
  value:
    description: "Value for set/lpush/rpush/sadd/hset operations"
    required: false
    default: ""
  field:
    description: "Hash field name (for hget/hset/hdel)"
    required: false
    default: ""
  ttl:
    description: "TTL in seconds (for set with expiry, or expire command)"
    required: false
    default: ""
  start:
    description: "Start index for lrange (default: 0)"
    required: false
    default: "0"
  stop:
    description: "Stop index for lrange (default: -1, meaning all)"
    required: false
    default: "-1"
  pattern:
    description: "Pattern for keys command (default: *)"
    required: false
    default: "*"

outputs:
  result:
    description: "Command result as JSON string"

runs:
  using: "node20"
  main: "dist/index.js"
